<div class="leaderboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 style="margin: 0;">Classement <span id="lb-group-name" class="text-gradient"></span></h1>
    <select id="lb-group-filter" class="form-input" style="width: auto; background: var(--bg-tertiary); min-width: 150px;">
        <option value="Global">Global</option>
    </select>
</div>
<link rel="stylesheet" href="frontend/css/templates/leaderboard.css">


<div class="podium-container" id="podium-container">
    <!-- Le podium sera généré ici via JS -->
</div>

<div id="lb-group-container" class="ranking-table-container">

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Utilisateur</th>
                    <th>Niveau</th>
                    <th>XP</th>
                    <th>Cours</th>
                    <th>Badges</th>
                </tr>
            </thead>
            <tbody id="group-leaderboard-list">
                <!-- Rempli par JS -->
            </tbody>
        </table>
    </div>
</div>
