<div class="parametres-container" style="max-width: 1000px; margin: 0 auto; padding: 2rem;">
    <h1 style="margin-bottom: 0.5rem;">Paramètres <span class="text-gradient">du compte</span></h1>
    <p class="subtitle" style="margin-bottom: 2rem; color: var(--text-muted);">Gérez vos informations personnelles et vos préférences.</p>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; align-items: stretch;">
        
        <!-- Section Informations Personnelles -->
        <div class="profile-section" style="display: flex; flex-direction: column;">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem; flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="user"></i> Informations personnelles</h2>
            <div class="settings-card card glass-panel" style="padding: 1.5rem; border-radius: 12px; flex-grow: 1; display: flex; flex-direction: column;">
                <form id="update-profile-form" style="display: flex; flex-direction: column; flex-grow: 1;">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Pseudo</label>
                        <input type="text" id="param-username" class="form-input" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: white;" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.5rem; flex-grow: 1;">
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Email</label>
                        <input type="email" id="param-email" class="form-input" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: white;" required>
                    </div>

                    <div style="margin-top: auto;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                            <i data-lucide="save"></i> Sauvegarder
                        </button>
                        <div style="text-align: center; margin-top: 0.5rem; min-height: 1.2em;">
                            <span id="profile-update-msg" style="display: none; font-size: 0.85em; font-weight: 500;"></span>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Section Sécurité -->
        <div class="profile-section" style="display: flex; flex-direction: column;">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem; flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="shield"></i> Sécurité</h2>
            <div class="settings-card card glass-panel" style="padding: 1.5rem; border-radius: 12px; flex-grow: 1; display: flex; flex-direction: column;">
                <form id="update-password-form" style="display: flex; flex-direction: column; flex-grow: 1;">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Nouveau mot de passe</label>
                        <input type="password" id="param-password" class="form-input" minlength="17" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: white;" placeholder="Minimum 17 caractères requis..." required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.5rem; flex-grow: 1;">
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Confirmer le mot de passe</label>
                        <input type="password" id="param-password-confirm" class="form-input" minlength="17" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: white;" placeholder="Confirmez les 17 caractères..." required>
                    </div>

                    <div style="margin-top: auto;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                            <i data-lucide="key"></i> Modifier le mot de passe
                        </button>
                        <div style="text-align: center; margin-top: 0.5rem; min-height: 1.2em;">
                            <span id="password-update-msg" style="display: none; font-size: 0.85em; font-weight: 500;"></span>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Section Préférences -->
        <div class="profile-section" style="display: flex; flex-direction: column;">
            <h2 style="font-size: 1.25rem; margin-bottom: 1rem; flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="sliders"></i> Préférences</h2>
            <div class="settings-card card glass-panel" style="padding: 1.5rem; border-radius: 12px; flex-grow: 1;">
                <div class="setting-item" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--bg-tertiary); border-radius: 8px; border: 1px solid var(--glass-border);">
                    <div class="setting-info" style="display: flex; gap: 1rem; align-items: center;">
                        <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(139, 92, 246, 0.1); display: flex; align-items: center; justify-content: center; color: var(--accent-primary);">
                            <i data-lucide="bell"></i>
                        </div>
                        <div>
                            <div class="setting-title" style="font-weight: 500; font-size: 1rem;">Notifications</div>
                            <div class="setting-desc" style="color: var(--text-muted); font-size: 0.85rem;">Alertes cours</div>
                        </div>
                    </div>
                    <label class="cyber-toggle-label" style="width: auto; padding: 0;">
                        <div class="cyber-toggle-wrapper">
                            <input type="checkbox" id="notif-toggle" checked>
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        
    </div>
</div>

<style>
/* Toggle Switch (Même style que Mode Brouillon) */
.cyber-toggle-label {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    gap: 1rem;
    cursor: pointer;
}

.cyber-toggle-wrapper {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
}

.cyber-toggle-wrapper input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    transition: .4s;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.toggle-slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background-color: var(--text-muted);
    transition: .4s;
    border-radius: 50%;
}

.cyber-toggle-wrapper input:checked+.toggle-slider {
    background-color: rgba(16, 185, 129, 0.2);
    border-color: var(--accent-green);
}

.cyber-toggle-wrapper input:checked+.toggle-slider:before {
    transform: translateX(20px);
    background-color: var(--accent-green);
    box-shadow: 0 0 10px var(--accent-green);
}
</style>
